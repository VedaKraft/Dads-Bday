<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Papa!</title>
    <style>
        /* CSS styling for a vibrant, colorful look */
        :root {
            --primary-color: #FF3366;
            --secondary-color: #33CCFF;
            --accent-color: #FFD700;
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
        }

        /* Header Animation */
        header {
            padding: 4rem 1rem;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff9a9e, 0 0 20px #ff9a9e; }
            to { text-shadow: 0 0 20px #fecfef, 0 0 30px #fecfef; }
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-top: 10px;
            -webkit-text-fill-color: var(--secondary-color);
            text-shadow: none;
        }

        /* Gallery Section */
        .gallery-container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .gallery-right {
            display: grid;
            grid-template-rows: repeat(2, minmax(230px, 1fr));
            gap: 24px;
        }

        .photo-card {
            background-color: rgba(255, 255, 255, 0.1);
            border: 3px dashed var(--secondary-color);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            color: #aaa;
        }

        .photo-card.large-card {
            height: 520px;
        }

        .photo-card.small-card {
            height: 240px;
        }

        @media (max-width: 780px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .gallery-right {
                grid-template-rows: repeat(2, minmax(240px, 1fr));
            }
        }

        .photo-card:hover {
            transform: scale(1.05);
            border-color: var(--primary-color);
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Update this image tag when you have your photos */
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            display: block;
        }

        /* Interactive Button */
        .btn-container {
            margin: 3rem 0 5rem 0;
        }

        button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Personal Message Section */
        .message-board {
            background: rgba(255, 255, 255, 0.05);
            max-width: 800px;
            margin: 0 auto 4rem auto;
            padding: 2rem;
            border-radius: 20px;
            border-left: 5px solid var(--accent-color);
        }

        .message-board h2 {
            color: var(--accent-color);
        }

        .message-board p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        /* Confetti Elements */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear forwards;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Happy Birthday Papa!</h1>
        <p class="subtitle">Celebrating you on April 25th!</p>
    </header>

    <div class="btn-container">
        <button id="celebrateBtn">Click for a Surprise!</button>
    </div>

    <div class="message-board">
        <h2>A Special Message For You</h2>
        <p>Papa, thank you for everything you do. I hope you have an amazing birthday filled with joy, laughter, and all your favorite things. I love you!</p>
        <p><em>- Vedant, Your Favorite Son</em></p>
    </div>

    <div class="gallery-container">
        <h2 style="color: var(--secondary-color); margin-bottom: 30px;">Our Best Memories</h2>
        <div class="gallery">
            <div class="photo-card large-card">
                <img src="papa.png" alt="You looking handsome in your suit" title="You looking handsome in your suit">
            </div>
            <div class="gallery-right">
                <div class="photo-card small-card">
                    <img src="tajmahal.png" alt="Us at the Taj Mahal" title="Us at the Taj Mahal">
                </div>
                <div class="photo-card small-card">
                    <img src="safari.png" alt="Us on a safari, remember?" title="Us on a safari, remember?">
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript for the Confetti Effect
        document.getElementById('celebrateBtn').addEventListener('click', function() {
            // Change button text temporarily
            const btn = this;
            const originalText = btn.innerText;
            btn.innerText = "Woohoo!! 🎉";
            setTimeout(() => btn.innerText = originalText, 2000);

            // Create confetti
            const colors = ['#FF3366', '#33CCFF', '#FFD700', '#66FF66', '#FF99CC'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    
                    // Randomize position, color, and size
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    // Randomize fall duration
                    const duration = Math.random() * 2 + 2; 
                    confetti.style.animationDuration = duration + 's';

                    document.body.appendChild(confetti);

                    // Clean up after animation finishes
                    setTimeout(() => {
                        confetti.remove();
                    }, duration * 1000);

                }, i * 20); // Stagger the creation for a continuous stream
            }
        });
    </script>
</body>
</html>
